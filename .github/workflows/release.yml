name: release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. v0.0.1)"
        required: true

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
        # x86_64-apple-darwin (macos-13) is omitted from the v0.0.x
        # series — that runner is being deprecated by GitHub and was
        # stuck in the queue for >10 minutes on the v0.0.1 attempt.
        # Re-add once Almide supports `almide build --target` for
        # cross-compile on macos-14 hosts, or once a stable Intel
        # runner returns.

    steps:
      - uses: actions/checkout@v4

      - name: install Almide
        run: |
          curl -fsSL https://raw.githubusercontent.com/almide/almide/main/tools/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: build (release)
        run: almide build --release -o awen

      - name: stage artifacts
        shell: bash
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          stage="awen-${TAG}-${TARGET}"
          mkdir -p "dist/${stage}"
          cp awen "dist/${stage}/awen"
          cp README.md LICENSE "dist/${stage}/" 2>/dev/null || true
          cd dist
          tar -czf "${stage}.tar.gz" "${stage}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          else
            sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: awen-${{ matrix.target }}
          path: dist/*.tar.gz*
          retention-days: 7

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: combined checksums
        run: cd dist && shasum -a 256 *.tar.gz > SHA256SUMS

      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/SHA256SUMS
          generate_release_notes: true

  homebrew:
    name: bump homebrew-tap
    needs: release
    runs-on: ubuntu-latest
    # Set repository variable PUBLISH_HOMEBREW=true (and the
    # TAP_DEPLOY_KEY secret) to enable. Skipped on first releases until
    # the deploy key for O6lvl4/homebrew-tap is wired in.
    if: ${{ vars.PUBLISH_HOMEBREW == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: render formula
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          (cd dist && shasum -a 256 *.tar.gz > SHA256SUMS)
          sha_for() {
            awk -v f="awen-v${VERSION}-$1.tar.gz" '$2 == f { print $1 }' dist/SHA256SUMS
          }
          SHA_DARWIN_ARM64=$(sha_for aarch64-apple-darwin)
          SHA_LINUX_X86_64=$(sha_for x86_64-unknown-linux-gnu)
          for s in "$SHA_DARWIN_ARM64" "$SHA_LINUX_X86_64"; do
            [ -n "$s" ] || { echo "missing sha for one or more targets" >&2; exit 1; }
          done
          mkdir -p out/Formula
          sed \
            -e "s|{{VERSION}}|${VERSION}|g" \
            -e "s|{{SHA_DARWIN_ARM64}}|${SHA_DARWIN_ARM64}|g" \
            -e "s|{{SHA_LINUX_X86_64}}|${SHA_LINUX_X86_64}|g" \
            packaging/homebrew/awen.rb.template > out/Formula/awen.rb
          cat out/Formula/awen.rb

      - name: checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: O6lvl4/homebrew-tap
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}
          path: tap

      - name: commit & push
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          cp out/Formula/awen.rb tap/Formula/awen.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/awen.rb
          if git diff --cached --quiet; then
            echo "tap formula already at v${VERSION}; nothing to commit"
            exit 0
          fi
          git commit -m "awen: bump to v${VERSION}"
          git push origin HEAD:main
